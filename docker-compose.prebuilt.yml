services:
  upscaler:
    image: ${CLARITY_IMAGE:-clarity-image-tools:cpu}
    container_name: clarity-upscaler
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8794}:8794"
    environment:
      MODEL_DIR: /models
      U2NET_HOME: /models/rembg
      STORAGE_DIR: /tmp/upscaler
      HISTORY_LIMIT: "${HISTORY_LIMIT:-100}"
      BATCH_HISTORY_LIMIT: "${BATCH_HISTORY_LIMIT:-50}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-64}"
      MAX_BATCH_FILES: "${MAX_BATCH_FILES:-100}"
      MAX_BATCH_TOTAL_MB: "${MAX_BATCH_TOTAL_MB:-512}"
      MAX_IMAGE_DIMENSION: "${MAX_IMAGE_DIMENSION:-16384}"
      UPSCALER_DEVICE: "${UPSCALER_DEVICE:-auto}"
      REMBG_DEVICE: "${REMBG_DEVICE:-auto}"
      APP_PORT: 8794
    volumes:
      - upscaler-models:/models
      - upscaler-storage:/tmp/upscaler

volumes:
  upscaler-models:
  upscaler-storage:
