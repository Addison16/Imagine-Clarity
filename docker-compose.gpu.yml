services:
  upscaler:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: ${CLARITY_GPU_IMAGE:-clarity-image-tools:gpu}
    environment:
      UPSCALER_DEVICE: auto
      REMBG_DEVICE: auto
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: ${CLARITY_GPU_IMAGE:-clarity-image-tools:gpu}
    environment:
      UPSCALER_DEVICE: auto
      REMBG_DEVICE: auto
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
